<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reporting Portal — Environmental Monitoring</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<a class="skip-link" href="#main-content">Skip to main content</a>

<nav class="nav" aria-label="Main navigation">
    <span class="nav__logo">🌿 EnvMonitor</span>
    <ul class="nav__links">
        <li><a href="/index.html">Dashboard</a></li>
        <li><a href="/trends.html">Trends</a></li>
        <li><a href="/alerts.html">Alerts</a></li>
        <li><a href="/portal.html" aria-current="page">Portal</a></li>
    </ul>
</nav>

<main id="main-content" class="main">

    <h1 style="margin-bottom: 8px; font-size: 1.4rem;">Analysis & Reporting Portal</h1>
    <p style="color: #5c6370; margin-bottom: 24px; font-size: 0.9rem;">Filter readings across sites and date ranges. Export results as CSV.</p>

    <div class="filters" role="search" aria-label="Filter portal data">
        <div class="filter-group">
            <label for="site-select">Site</label>
            <select id="site-select"><option value="">All sites</option></select>
        </div>
        <div class="filter-group">
            <label for="from-date">From</label>
            <input type="date" id="from-date" />
        </div>
        <div class="filter-group">
            <label for="to-date">To</label>
            <input type="date" id="to-date" />
        </div>
        <div class="filter-group" style="flex-direction: row; gap: 8px; align-items: flex-end;">
            <button class="btn btn--primary" id="apply-btn">Apply Filters</button>
            <button class="btn btn--secondary" id="export-btn" disabled>Export CSV</button>
        </div>
    </div>

    <section aria-labelledby="summary-heading" style="margin-bottom: 24px;">
        <h2 id="summary-heading" style="font-size: 1rem; font-weight: 600; margin-bottom: 12px;">Summary</h2>
        <div id="summary-grid" class="grid grid--3"><p class="state-empty">Apply filters to see a summary.</p></div>
    </section>

    <section aria-labelledby="results-heading">
        <h2 id="results-heading" style="font-size: 1rem; font-weight: 600; margin-bottom: 12px;">Results</h2>
        <div class="card" style="overflow-x: auto;">
            <div id="results-table-container"><p class="state-empty">Apply filters to view results.</p></div>
        </div>
    </section>

</main>

<script type="module">
    import { fetchReadings, fetchSites } from "/js/api.js";
    import { severityClass, showError, showEmpty, populateSiteSelector } from "/js/main.js";

    const siteSelect     = document.getElementById("site-select");
    const fromDate       = document.getElementById("from-date");
    const toDate         = document.getElementById("to-date");
    const applyBtn       = document.getElementById("apply-btn");
    const exportBtn      = document.getElementById("export-btn");
    const summaryGrid    = document.getElementById("summary-grid");
    const tableContainer = document.getElementById("results-table-container");
    let currentResults   = [];

    await populateSiteSelector(siteSelect);

    function filterByDateRange(readings, from, to) {
        return readings.filter(r => {
            if (from && r.timestamp < from) return false;
            if (to   && r.timestamp > to + "T23:59:59") return false;
            return true;
        });
    }

    function buildSummary(readings) {
        const byType = readings.reduce((acc, r) => {
            if (!acc[r.sensorType]) acc[r.sensorType] = [];
            acc[r.sensorType].push(r.value);
            return acc;
        }, {});
        return Object.entries(byType).map(([type, vals]) => ({
            type,
            count: vals.length,
            min: Math.min(...vals).toFixed(2),
            max: Math.max(...vals).toFixed(2),
            avg: (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(2)
        }));
    }

    function exportCSV(readings) {
        if (!readings.length) return;
        const headers = ["id", "siteId", "sensorType", "value", "unit", "timestamp", "severity"];
        const rows = readings.map(r => headers.map(h => `"${r[h] ?? ""}"`).join(","));
        const blob = new Blob([[headers.join(","), ...rows].join("\n")], { type: "text/csv" });
        const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(blob), download: "readings-export.csv" });
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    async function loadPortal() {
        const siteId = siteSelect.value || null;
        const from   = fromDate.value   || null;
        const to     = toDate.value     || null;

        try {
            let readings = [];
            if (siteId) {
                readings = await fetchReadings(siteId, from, to);
            } else {
                const sites   = await fetchSites();
                const results = await Promise.all(sites.map(s => fetchReadings(s.id, from, to)));
                readings = results.flat();
            }

            currentResults = (from || to) ? filterByDateRange(readings, from, to) : readings;

            if (!currentResults.length) {
                showEmpty(summaryGrid, "No data found for the selected filters.");
                showEmpty(tableContainer, "");
                exportBtn.disabled = true;
                return;
            }

            exportBtn.disabled = false;

            summaryGrid.innerHTML = buildSummary(currentResults).map(s => `
                <div class="card">
                    <p class="card__title">${s.type.replace(/_/g, " ")}</p>
                    <p style="font-size: 0.85rem; color: #5c6370;">${s.count} readings</p>
                    <p>Min: <strong>${s.min}</strong> &nbsp; Max: <strong>${s.max}</strong> &nbsp; Avg: <strong>${s.avg}</strong></p>
                </div>`).join("");

            tableContainer.innerHTML = `
                <table class="data-table" aria-label="Filtered readings">
                    <thead><tr>
                        <th scope="col">Site</th><th scope="col">Sensor Type</th>
                        <th scope="col">Value</th><th scope="col">Unit</th>
                        <th scope="col">Timestamp</th><th scope="col">Severity</th>
                    </tr></thead>
                    <tbody>${currentResults.map(r => `
                        <tr>
                            <td>${r.siteId}</td>
                            <td>${r.sensorType.replace(/_/g, " ")}</td>
                            <td>${r.value}</td><td>${r.unit}</td><td>${r.timestamp}</td>
                            <td><span class="badge badge--${severityClass(r.severity)}">${r.severity}</span></td>
                        </tr>`).join("")}
                    </tbody>
                </table>`;
        } catch {
            showError(summaryGrid, "Failed to load data. Please try again.");
            exportBtn.disabled = true;
        }
    }

    applyBtn.addEventListener("click", loadPortal);
    exportBtn.addEventListener("click", () => exportCSV(currentResults));
</script>

</body>
</html>
