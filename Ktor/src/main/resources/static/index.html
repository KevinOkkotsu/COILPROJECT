<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Environmental Monitoring</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<a class="skip-link" href="#main-content">Skip to main content</a>

<nav class="nav" aria-label="Main navigation">
    <span class="nav__logo">🌿 EnvMonitor</span>
    <ul class="nav__links">
        <li><a href="/index.html" aria-current="page">Dashboard</a></li>
        <li><a href="/trends.html">Trends</a></li>
        <li><a href="/alerts.html">Alerts</a></li>
        <li><a href="/portal.html">Portal</a></li>
    </ul>
</nav>

<main id="main-content" class="main">

    <h1 style="margin-bottom: 20px; font-size: 1.4rem;">Live Dashboard</h1>

    <section aria-labelledby="status-heading" style="margin-bottom: 24px;">
        <h2 id="status-heading" style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; color: #5c6370; margin-bottom: 8px;">Overall Status</h2>
        <div id="overall-status" class="status-indicator status-indicator--normal" role="status" aria-live="polite">Loading…</div>
    </section>

    <div class="filters" style="margin-bottom: 20px;">
        <div class="filter-group">
            <label for="site-select">Site</label>
            <select id="site-select" aria-label="Select monitoring site"><option value="">Loading sites…</option></select>
        </div>
    </div>

    <section aria-labelledby="readings-heading" style="margin-bottom: 24px;">
        <h2 id="readings-heading" style="font-size: 1rem; font-weight: 600; margin-bottom: 12px;">Current Readings</h2>
        <div id="readings-grid" class="grid grid--3">
            <p class="state-empty">Select a site to view current readings.</p>
        </div>
    </section>

    <section aria-labelledby="alerts-heading">
        <h2 id="alerts-heading" style="font-size: 1rem; font-weight: 600; margin-bottom: 12px;">Active Alerts</h2>
        <div id="alerts-panel" aria-live="polite">
            <p class="state-empty">No active alerts.</p>
        </div>
    </section>

</main>

<script type="module">
    import { fetchReadings, fetchAlerts } from "/js/api.js";
    import { severityClass, showError, showEmpty, populateSiteSelector } from "/js/main.js";

    const siteSelect    = document.getElementById("site-select");
    const readingsGrid  = document.getElementById("readings-grid");
    const alertsPanel   = document.getElementById("alerts-panel");
    const overallStatus = document.getElementById("overall-status");

    await populateSiteSelector(siteSelect);

    async function loadDashboard(siteId) {
        if (!siteId) return;
        try {
            const [readings, alerts] = await Promise.all([fetchReadings(siteId), fetchAlerts(siteId)]);

            if (readings.length === 0) {
                showEmpty(readingsGrid, "No readings found for this site.");
            } else {
                readingsGrid.innerHTML = readings.map(r => `
                    <article class="card">
                        <p class="card__title">${r.sensorType.replace(/_/g, " ")}</p>
                        <p style="font-size: 1.6rem; font-weight: 700; margin: 8px 0;">${r.value} <span style="font-size: 0.9rem; font-weight: 400;">${r.unit}</span></p>
                        <span class="badge badge--${severityClass(r.severity)}">${r.severity}</span>
                        <p style="font-size: 0.75rem; color: #5c6370; margin-top: 8px;">${r.timestamp}</p>
                    </article>`).join("");
            }

            const hasCritical = alerts.some(a => a.severity === "CRITICAL");
            const hasWarning  = alerts.some(a => a.severity === "WARNING");
            const level = hasCritical ? "critical" : hasWarning ? "warning" : "normal";
            overallStatus.className = `status-indicator status-indicator--${level}`;
            overallStatus.textContent = level.toUpperCase();

            const activeAlerts = alerts.filter(a => !a.resolved && a.severity !== "NORMAL");
            if (activeAlerts.length === 0) {
                showEmpty(alertsPanel, "No active alerts.");
            } else {
                alertsPanel.innerHTML = activeAlerts.map(a => `
                    <div class="alert-item alert-item--${severityClass(a.severity)}" role="listitem">
                        <p class="alert-item__message">${a.message}</p>
                        <p class="alert-item__meta">
                            <span class="badge badge--${severityClass(a.severity)}">${a.severity}</span>
                            &nbsp;${a.sensorType.replace(/_/g, " ")} · ${a.timestamp}
                        </p>
                    </div>`).join("");
            }
        } catch {
            showError(readingsGrid, "Could not load data. Please check your connection and try again.");
            overallStatus.textContent = "Unavailable";
        }
    }

    siteSelect.addEventListener("change", () => loadDashboard(siteSelect.value));
</script>

</body>
</html>
