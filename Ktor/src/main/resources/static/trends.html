<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Historical Trends — Environmental Monitoring</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>

<a class="skip-link" href="#main-content">Skip to main content</a>

<nav class="nav" aria-label="Main navigation">
    <span class="nav__logo">🌿 EnvMonitor</span>
    <ul class="nav__links">
        <li><a href="/index.html">Dashboard</a></li>
        <li><a href="/trends.html" aria-current="page">Trends</a></li>
        <li><a href="/alerts.html">Alerts</a></li>
        <li><a href="/portal.html">Portal</a></li>
    </ul>
</nav>

<main id="main-content" class="main">

    <h1 style="margin-bottom: 20px; font-size: 1.4rem;">Historical Trends</h1>

    <div class="filters" role="search" aria-label="Filter trends">
        <div class="filter-group">
            <label for="site-select">Site</label>
            <select id="site-select"><option value="">Loading…</option></select>
        </div>
        <div class="filter-group">
            <label for="sensor-select">Sensor Type</label>
            <select id="sensor-select">
                <option value="soil_moisture">Soil Moisture</option>
                <option value="water_level">Water Level</option>
                <option value="air_quality">Air Quality</option>
                <option value="temperature">Temperature</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="from-date">From</label>
            <input type="date" id="from-date" />
        </div>
        <div class="filter-group">
            <label for="to-date">To</label>
            <input type="date" id="to-date" />
        </div>
        <div class="filter-group" style="justify-content: flex-end;">
            <button class="btn btn--primary" id="apply-btn">Apply</button>
        </div>
    </div>

    <div class="card">
        <h2 class="card__title">Sensor Readings Over Time</h2>
        <div class="chart-container">
            <canvas id="trends-chart" aria-label="Time series chart of sensor readings" role="img"></canvas>
        </div>
        <div id="chart-state"></div>
    </div>

</main>

<script type="module">
    import { fetchReadings } from "/js/api.js";
    import { mapReadingsToChartData, renderTimeSeriesChart } from "/js/charts.js";
    import { showError, showEmpty, populateSiteSelector } from "/js/main.js";

    const siteSelect   = document.getElementById("site-select");
    const sensorSelect = document.getElementById("sensor-select");
    const fromDate     = document.getElementById("from-date");
    const toDate       = document.getElementById("to-date");
    const applyBtn     = document.getElementById("apply-btn");
    const chartState   = document.getElementById("chart-state");
    let chartInstance  = null;

    await populateSiteSelector(siteSelect);

    async function loadChart() {
        const siteId = siteSelect.value;
        if (!siteId) { showEmpty(chartState, "Please select a site."); return; }

        try {
            const readings = await fetchReadings(siteId, fromDate.value || null, toDate.value || null);
            const filtered = readings.filter(r => r.sensorType === sensorSelect.value);

            if (chartInstance) chartInstance.destroy();

            if (filtered.length === 0) { showEmpty(chartState, "No readings found for the selected filters."); return; }

            chartState.innerHTML = "";
            const { labels, values } = mapReadingsToChartData(filtered);
            chartInstance = renderTimeSeriesChart(document.getElementById("trends-chart"), labels, values, sensorSelect.value.replace(/_/g, " "));
        } catch {
            showError(chartState, "Failed to load chart data. Please try again.");
        }
    }

    applyBtn.addEventListener("click", loadChart);
</script>

</body>
</html>
